<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/brand.css">
<title>Check-In — Silver Glider</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:#111;border-bottom:1px solid #222;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:18px;font-weight:600;letter-spacing:.05em}
.container{padding:20px;max-width:600px;margin:0 auto}
#login-screen,#checkin-screen{display:none}
#login-screen.active,#checkin-screen.active{display:block}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:24px;margin-bottom:16px}
.card h2{font-size:12px;color:#666;letter-spacing:.05em;text-transform:uppercase;margin-bottom:20px}
input,select{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#f0f0f0;padding:14px 16px;border-radius:8px;font-size:16px;margin-bottom:12px;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:#444}
input::placeholder{color:#444}
button.primary{width:100%;background:#1CC5BE;color:#0a0a0a;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
#error-msg{color:#ff4444;font-size:14px;margin-top:8px;text-align:center}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{flex:1;padding:12px;border-radius:8px;border:1px solid #222;background:#111;color:#666;font-size:14px;font-weight:600;cursor:pointer;text-align:center}
.tab.active{background:#1CC5BE;color:#0a0a0a;border-color:#1CC5BE}
#scanner-section,#search-section{display:none}
#scanner-section.active,#search-section.active{display:block}
#qr-reader{border-radius:12px;overflow:hidden;margin-bottom:16px}
#qr-reader video{border-radius:12px}
.result-banner{padding:24px;border-radius:12px;text-align:center;margin-bottom:16px;display:none}
.result-banner.success{background:#1a2a1a;border:1px solid #2a4a2a}
.result-banner.error{background:#2a1a1a;border:1px solid #4a2a2a}
.result-banner.warning{background:#2a2a1a;border:1px solid #4a4a2a}
.result-icon{font-size:48px;margin-bottom:8px}
.result-title{font-size:22px;font-weight:700;margin-bottom:4px}
.result-subtitle{font-size:14px;color:#888}
.result-banner.success .result-title{color:#4caf50}
.result-banner.error .result-title{color:#f44336}
.result-banner.warning .result-title{color:#ffc107}
.scan-btn{width:100%;background:#4caf50;color:#fff;border:none;padding:16px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:8px}
.scan-btn.stop{background:#333;color:#888}
#search-box{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#f0f0f0;padding:14px 16px;border-radius:8px;font-size:16px;outline:none;margin-bottom:16px}
.result-card{background:#111;border:1px solid #222;border-radius:12px;padding:20px;margin-bottom:12px}
.result-card .name{font-size:20px;font-weight:600;margin-bottom:4px}
.result-card .meta{font-size:13px;color:#666;margin-bottom:16px}
.ticket-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid #1a1a1a}
.ticket-id{font-family:monospace;font-size:14px;color:#aaa}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase}
.badge.valid{background:#1a2a1a;color:#4caf50;border:1px solid #2a4a2a}
.badge.checked{background:#1a1a2a;color:#5588ff;border:1px solid #2a2a4a}
.checkin-btn{background:#4caf50;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
#no-results{text-align:center;color:#444;padding:40px 0;display:none}
#logout-btn{background:none;border:1px solid #333;color:#666;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:none}
</style>
</head>
<body>
<header>
<a href="/" class="sg-logo"><img src="/logo.png" alt="Silver Glider"><div class="sg-logo-text"><span class="sg-logo-name">Silver Glider</span><span class="sg-logo-sub">Tickets</span></div></a>
<div style="display:flex;align-items:center;gap:8px">
<span id="staff-name" style="font-size:13px;color:#666"></span>
<button id="logout-btn" onclick="logout()">Log out</button>
</div>
</header>
<div class="container">

<!-- LOGIN -->
<div id="login-screen" class="active">
<div style="height:40px"></div>
<div class="card">
<h2>Staff Login</h2>
<input type="email" id="login-email" placeholder="Email" autocomplete="email">
<input type="password" id="login-password" placeholder="Password">
<button class="primary" onclick="doLogin()">Sign In</button>
<div id="error-msg"></div>
</div>
</div>

<!-- CHECK-IN -->
<div id="checkin-screen">
<div style="height:20px"></div>
<a href="/doorlist" style="display:block;text-align:right;font-size:12px;color:#444;margin-bottom:12px;text-decoration:none;">🖨 Print Door List →</a>
<select id="event-select" onchange="loadEvent()">
<option value="">Select event...</option>
</select>

<div class="tabs">
<div class="tab active" id="tab-scan" onclick="switchTab('scan')">📷 Scan QR</div>
<div class="tab" id="tab-search" onclick="switchTab('search')">🔍 Search</div>
</div>

<!-- SCANNER TAB -->
<div id="scanner-section" class="active">
<div id="result-banner" class="result-banner">
<div class="result-icon" id="result-icon"></div>
<div class="result-title" id="result-title"></div>
<div class="result-subtitle" id="result-subtitle"></div>
</div>
<div id="qr-reader"></div>
<button class="scan-btn" id="scan-toggle-btn" onclick="toggleScanner()">Start Scanner</button>
</div>

<!-- SEARCH TAB -->
<div id="search-section">
<input type="search" id="search-box" placeholder="Search name, email, or confirmation #" oninput="doSearch()">
<div id="results"></div>
<div id="no-results">No results found</div>
</div>
</div>

</div>
<script>
let token=localStorage.getItem('sgt_token');
let currentEventId=null;
let scanner=null;
let scannerRunning=false;
let searchTimeout=null;

if(token)showCheckinScreen();

async function doLogin(){
  const email=document.getElementById('login-email').value;
  const password=document.getElementById('login-password').value;
  const err=document.getElementById('error-msg');
  err.textContent='';
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok)return err.textContent=data.error;
    token=data.token;
    localStorage.setItem('sgt_token',token);
    document.getElementById('staff-name').textContent=data.first_name;
    showCheckinScreen();
  }catch{err.textContent='Connection error';}
}

async function showCheckinScreen(){
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('checkin-screen').classList.add('active');
  document.getElementById('logout-btn').style.display='inline-block';
  try{
    const res=await fetch('/api/events',{headers:{Authorization:`Bearer ${token}`}});
    if(res.status===401)return logout();
    const events=await res.json();
    const sel=document.getElementById('event-select');
    events.forEach(e=>{
      const opt=document.createElement('option');
      opt.value=e.id;
      opt.textContent=`${e.name} — ${new Date(e.event_date).toLocaleDateString()}`;
      sel.appendChild(opt);
    });
  }catch{}
}

function loadEvent(){
  currentEventId=document.getElementById('event-select').value;
  document.getElementById('results').innerHTML='';
  document.getElementById('search-box').value='';
  showResult(null);
}

function switchTab(tab){
  document.getElementById('tab-scan').classList.toggle('active',tab==='scan');
  document.getElementById('tab-search').classList.toggle('active',tab==='search');
  document.getElementById('scanner-section').classList.toggle('active',tab==='scan');
  document.getElementById('search-section').classList.toggle('active',tab==='search');
  if(tab!=='scan'&&scannerRunning)stopScanner();
}

async function toggleScanner(){
  if(scannerRunning){stopScanner();return;}
  showResult(null);
  scanner=new Html5Qrcode('qr-reader');
  try{
    await scanner.start(
      {facingMode:'environment'},
      {fps:10,qrbox:{width:250,height:250}},
      onScanSuccess,
      ()=>{}
    );
    scannerRunning=true;
    document.getElementById('scan-toggle-btn').textContent='Stop Scanner';
    document.getElementById('scan-toggle-btn').classList.add('stop');
  }catch(e){
    showResult({result:'error',message:'Camera access denied. Please allow camera permission.'});
  }
}

function stopScanner(){
  if(scanner&&scannerRunning){
    scanner.stop().catch(()=>{});
    scannerRunning=false;
    document.getElementById('scan-toggle-btn').textContent='Start Scanner';
    document.getElementById('scan-toggle-btn').classList.remove('stop');
  }
}

async function onScanSuccess(qrToken){
  stopScanner();
  if(!currentEventId){
    showResult({result:'error',message:'Please select an event first'});
    return;
  }
  try{
    const res=await fetch(`/api/tickets/scan/${qrToken}`,{
      method:'POST',
      headers:{Authorization:`Bearer ${token}`}
    });
    const data=await res.json();
    showResult(data);
  }catch{
    showResult({result:'error',message:'Connection error'});
  }
}

function showResult(data){
  const banner=document.getElementById('result-banner');
  if(!data){banner.style.display='none';return;}
  banner.style.display='block';
  const icon=document.getElementById('result-icon');
  const title=document.getElementById('result-title');
  const subtitle=document.getElementById('result-subtitle');
  banner.className='result-banner';
  if(data.result==='success'){
    banner.classList.add('success');
    icon.textContent='✅';
    title.textContent='Checked In!';
    subtitle.textContent=`${data.ticket_id} · ${data.ticket_type||''}`;
  }else if(data.result==='already_checked_in'){
    banner.classList.add('warning');
    icon.textContent='⚠️';
    title.textContent='Already Checked In';
    subtitle.textContent=data.ticket_id||'';
  }else if(data.result==='void'){
    banner.classList.add('error');
    icon.textContent='🚫';
    title.textContent='Void Ticket';
    subtitle.textContent='This ticket has been voided';
  }else if(data.result==='refunded'){
    banner.classList.add('error');
    icon.textContent='🚫';
    title.textContent='Refunded Ticket';
    subtitle.textContent='This ticket was refunded';
  }else{
    banner.classList.add('error');
    icon.textContent='❌';
    title.textContent='Invalid Ticket';
    subtitle.textContent=data.message||'Not recognized';
  }
}

function doSearch(){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(runSearch,300);
}

async function runSearch(){
  const q=document.getElementById('search-box').value.trim();
  if(!currentEventId||q.length<2){document.getElementById('results').innerHTML='';return;}
  try{
    const res=await fetch(`/api/orders?event_id=${currentEventId}&q=${encodeURIComponent(q)}`,{headers:{Authorization:`Bearer ${token}`}});
    const orders=await res.json();
    renderSearchResults(orders);
  }catch{}
}

async function renderSearchResults(orders){
  const container=document.getElementById('results');
  const noResults=document.getElementById('no-results');
  container.innerHTML='';
  if(!orders.length){noResults.style.display='block';return;}
  noResults.style.display='none';
  for(const order of orders){
    const tRes=await fetch(`/api/tickets/order/${order.id}`,{headers:{Authorization:`Bearer ${token}`}});
    const tickets=await tRes.json();
    const card=document.createElement('div');
    card.className='result-card';
    card.innerHTML=`<div class="name">${order.buyer_last_name}, ${order.buyer_first_name}</div><div class="meta">${order.order_number} · ${order.quantity} ticket${order.quantity>1?'s':''} · ${order.buyer_email}</div>${tickets.map(t=>`<div class="ticket-row" id="row-${t.ticket_id}"><div><div class="ticket-id">${t.ticket_id}</div><div style="font-size:12px;color:#555;margin-top:2px">${t.ticket_type}</div></div>${t.checkin_status==='checked_in'?'<span class="badge checked">Checked In</span>':`<button class="checkin-btn" onclick="manualCheckIn('${t.ticket_id}',this)">Check In</button>`}</div>`).join('')}`;
    container.appendChild(card);
  }
}

async function manualCheckIn(ticketId,btn){
  btn.disabled=true;btn.textContent='...';
  try{
    const res=await fetch(`/api/tickets/checkin/${ticketId}`,{method:'POST',headers:{Authorization:`Bearer ${token}`}});
    const data=await res.json();
    if(data.success){document.getElementById(`row-${ticketId}`).querySelector('.checkin-btn').outerHTML='<span class="badge checked">Checked In</span>';}
    else{btn.disabled=false;btn.textContent='Check In';}
  }catch{btn.disabled=false;btn.textContent='Check In';}
}

function logout(){localStorage.removeItem('sgt_token');location.reload();}
</script>
</body>
</html>
