<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find My Tickets — Silver Glider</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:32px 28px;width:100%;max-width:420px}
.logo{font-size:13px;letter-spacing:.2em;color:#555;margin-bottom:32px;text-align:center}
h1{font-size:22px;font-weight:700;margin-bottom:8px;text-align:center}
p.sub{font-size:14px;color:#555;text-align:center;margin-bottom:28px;line-height:1.6}
input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#f0f0f0;padding:14px 16px;border-radius:8px;font-size:16px;margin-bottom:12px;outline:none}
input:focus{border-color:#444}
input::placeholder{color:#444}
button{width:100%;background:#f0f0f0;color:#0a0a0a;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
button:disabled{background:#222;color:#444;cursor:default}
#msg{margin-top:16px;font-size:14px;text-align:center;line-height:1.6;display:none}
#msg.success{color:#4caf50}
#msg.error{color:#ff4444}
#msg.info{color:#888}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⬡ SILVER GLIDER</div>
  <h1>Find My Tickets</h1>
  <p class="sub">Enter the email you used to purchase your tickets and we'll resend your wallet link.</p>
  <input type="email" id="email-input" placeholder="Your email address" autocomplete="email">
  <button id="submit-btn" onclick="lookup()">Send My Tickets</button>
  <div id="msg"></div>
</div>
<script>
async function lookup(){
  const email=document.getElementById('email-input').value.trim();
  const msg=document.getElementById('msg');
  const btn=document.getElementById('submit-btn');
  msg.style.display='none';
  if(!email){msg.className='error';msg.textContent='Please enter your email address.';msg.style.display='block';return;}
  btn.disabled=true;btn.textContent='Sending...';
  try{
    const res=await fetch('/api/orders/resend-tickets',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const data=await res.json();
    if(data.found){
      msg.className='success';
      msg.innerHTML=`Sent! Check your inbox for your ticket${data.count>1?'s'}.<br><span style="color:#555;font-size:13px">Don't forget to check your spam folder.</span>`;
    }else{
      msg.className='error';
      msg.textContent='No tickets found for that email address.';
      btn.disabled=false;btn.textContent='Send My Tickets';
    }
  }catch{
    msg.className='error';
    msg.textContent='Something went wrong. Try again.';
    btn.disabled=false;btn.textContent='Send My Tickets';
  }
  msg.style.display='block';
}
document.getElementById('email-input').addEventListener('keydown',e=>{if(e.key==='Enter')lookup();});
</script>
</body>
</html>
